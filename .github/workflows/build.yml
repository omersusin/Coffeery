name: Build Debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Install a pinned Gradle and expose it on PATH. Because we pass an
      # explicit gradle-version, the `gradle` command works WITHOUT a
      # pre-existing wrapper — so we can (re)generate the wrapper cleanly and
      # never hit gradle-wrapper.jar checksum problems.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper (isolated, checksum-safe)
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coffeery-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
